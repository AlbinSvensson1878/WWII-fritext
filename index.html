<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Andra världskriget – fritextfrågor</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 800px;
      margin: auto;
    }

    h1 {
      text-align: center;
    }

    .question {
      background: white;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 10px;
    }

    textarea {
      width: 100%;
      height: 120px;
      margin-top: 10px;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      margin-top: 20px;
    }

    .answer {
      display: none;
      background: #e6ffe6;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
      white-space: pre-line;
    }

    .warning {
      color: red;
      display: none;
      margin-top: 10px;
    }
  </style>
</head>

<body>
<div class="container">
  <h1>Fritextfrågor – Andra världskriget</h1>
  <p>Svara på alla frågor. Klicka sedan på <b>Lämna in</b> för att se mallsvaren.</p>

  <div id="questions"></div>

  <button onclick="submitAnswers()">Lämna in</button>
  <button onclick="resetAnswers()">Rensa</button>

  <div id="warning" class="warning">
    Du måste svara på alla frågor först!
  </div>
</div>

<script>
const questions = [
{
  title: "Fråga 1",
  text: "Varför kunde nazistpartiet ta makten i Tyskland? Resonera och ta hjälp av följande:\n• Hur situationen var i Tyskland\n• Hitlers egenskaper\n• Idéer i samhället",
  modelAnswer: `Nazistpartiet kunde ta makten i Tyskland av flera orsaker. En viktig orsak var att landet hade stora problem efter första världskriget. Tyskland hade förlorat kriget och tvingats skriva under Versaillesfreden, vilket många upplevde som orättvist.

Under 1930-talet blev situationen ännu värre när den stora depressionen slog till. Många människor blev arbetslösa och fattiga. Förtroendet för demokratin minskade eftersom många tyckte att politikerna inte kunde lösa problemen.

En annan viktig orsak var Adolf Hitler. Han var en skicklig talare och använde propaganda för att påverka människor. Han lovade jobb och att göra Tyskland starkt igen.

Nazisterna utnyttjade också idéer som redan fanns i samhället, som nationalism och antisemitism. De skyllde problemen på olika grupper och lovade enkla lösningar.

Sammanfattningsvis tog nazistpartiet makten på grund av ekonomiska problem, svag demokrati, Hitlers ledarskap och idéer i samhället.`
},

{
  title: "Fråga 2",
  text: "Hur kunde Hitler expandera utan krig i början?",
  modelAnswer: `Hitler började bryta mot Versaillesfreden steg för steg. Han byggde upp militären och skickade trupper till Rhenlandet 1936 utan att andra länder ingrep.

1938 tog Tyskland över Österrike (Anschluss). Samma år fick Hitler områden i Tjeckoslovakien genom Münchenöverenskommelsen.

Storbritannien och Frankrike ville undvika krig och lät därför Hitler fortsätta. Detta kallas eftergiftspolitik.`
},

{
  title: "Fråga 3",
  text: "Varför attackerade Tyskland Polen?",
  modelAnswer: `Hitler ville utöka Tyskland och skapa livsrum. Polen hade områden som Tyskland tidigare förlorat.

Tyskland och Sovjetunionen skrev ett avtal där de delade upp Polen mellan sig. När Tyskland attackerade Polen 1939 startade andra världskriget.`
},

{
  title: "Fråga 4",
  text: "Vad är blixkrig?",
  modelAnswer: `Blixkrig är en snabb krigsmetod där flyg och stridsvagnar används tillsammans för att snabbt slå ut fienden.

Metoden var effektiv eftersom många länder inte var förberedda på snabba attacker.`
}
];

const container = document.getElementById("questions");

questions.forEach((q, i) => {
  const div = document.createElement("div");
  div.className = "question";

  div.innerHTML = `
    <b>${q.title}</b><br>
    ${q.text}
    <textarea id="answer-${i}"></textarea>
    <div id="model-${i}" class="answer">${q.modelAnswer}</div>
  `;

  container.appendChild(div);
});

function submitAnswers() {
  let allAnswered = true;

  questions.forEach((_, i) => {
    const val = document.getElementById(`answer-${i}`).value.trim();
    if (!val) allAnswered = false;
  });

  if (!allAnswered) {
    document.getElementById("warning").style.display = "block";
    return;
  }

  document.getElementById("warning").style.display = "none";

  questions.forEach((_, i) => {
    document.getElementById(`model-${i}`).style.display = "block";
  });
}

function resetAnswers() {
  document.getElementById("warning").style.display = "none";

  questions.forEach((_, i) => {
    document.getElementById(`answer-${i}`).value = "";
    document.getElementById(`model-${i}`).style.display = "none";
  });
}
</script>

</body>
</html>
